<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Mini Chat</title>
<style>
body{font-family:sans-serif;background:#f2f2f2;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}

.login, .chat{width:350px;background:#fff;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);padding:15px}
.chat{height:500px;display:none;flex-direction:column;padding:0}

.messages{flex:1;overflow:auto;padding:10px}
.msg{margin:8px 0;padding:8px;border-radius:10px;background:#e3f2fd}
.name{font-weight:bold}

.input{display:flex;border-top:1px solid #ddd}
input{flex:1;padding:10px;border:none}
button{padding:10px;border:none;background:#4caf50;color:#fff;cursor:pointer}

img{max-width:100%;border-radius:10px;margin-top:5px}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
    <h3>ورود</h3>
    <input type="password" id="pass" placeholder="پسورد"><br><br>
    <input type="text" id="name" placeholder="اسم شما"><br><br>
    <button onclick="login()">ورود</button>
</div>

<!-- CHAT -->
<div class="chat" id="chatBox">
    <div class="messages" id="messages"></div>
    <div class="input">
        <input type="text" id="text" placeholder="پیام...">
        <input type="file" id="file">
        <button onclick="send()">ارسال</button>
    </div>
</div>

<script>
const PASSWORD = "1234"; // پسورد ثابت

let username = "";
let userColor = "";

// رنگ تصادفی برای هر کاربر
function randomColor(){
    return "#" + Math.floor(Math.random()*16777215).toString(16);
}

function login(){
    let pass = document.getElementById("pass").value;
    let name = document.getElementById("name").value;

    if(pass !== PASSWORD){
        alert("پسورد اشتباهه!");
        return;
    }

    if(!name){
        alert("اسم وارد کن");
        return;
    }

    username = name;
    userColor = randomColor();

    document.getElementById("loginBox").style.display="none";
    document.getElementById("chatBox").style.display="flex";

    load();
}

async function load(){
    let res = await fetch('/api/chat');
    let data = await res.json();

    let box = document.getElementById('messages');
    box.innerHTML = "";

    data.forEach(m=>{
        let div = document.createElement('div');
        div.className = "msg";

        let name = `<span class="name" style="color:${m.color}">${m.user}</span><br>`;

        if(m.type === "text"){
            div.innerHTML = name + m.content;
        }else{
            div.innerHTML = name + `<img src="${m.content}">`;
        }

        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

async function send(){
    let text = document.getElementById('text').value;
    let file = document.getElementById('file').files[0];

    if(file){
        let reader = new FileReader();
        reader.onload = async function(){
            await fetch('/api/chat',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({
                    user: username,
                    color: userColor,
                    type:'image',
                    content: reader.result
                })
            });
            load();
        };
        reader.readAsDataURL(file);
    }else if(text){
        await fetch('/api/chat',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                user: username,
                color: userColor,
                type:'text',
                content:text
            })
        });
        document.getElementById('text').value="";
        load();
    }
}

setInterval(load,2000);
</script>

</body>
</html>
